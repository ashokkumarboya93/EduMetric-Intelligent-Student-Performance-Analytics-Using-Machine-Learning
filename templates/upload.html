<!DOCTYPE html>
<html>
<head>
    <title>Batch Upload Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        .container { max-width: 600px; }
        .form-group { margin: 20px 0; }
        input[type="file"] { padding: 10px; border: 1px solid #ccc; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin: 20px 0; padding: 15px; border-radius: 5px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Student Batch Upload</h1>
        
        <div class="form-group">
            <a href="/api/students/download-template" download>
                <button type="button">Download CSV Template</button>
            </a>
        </div>
        
        <form id="uploadForm" enctype="multipart/form-data">
            <div class="form-group">
                <label>Select CSV or Excel file:</label><br>
                <input type="file" id="fileInput" name="file" accept=".csv,.xlsx,.xls" required>
            </div>
            
            <div class="form-group">
                <button type="submit">Upload Students</button>
            </div>
        </form>
        
        <div id="result"></div>
    </div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const fileInput = document.getElementById('fileInput');
            const resultDiv = document.getElementById('result');
            
            if (!fileInput.files[0]) {
                resultDiv.innerHTML = '<div class="error">Please select a file</div>';
                return;
            }
            
            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            
            resultDiv.innerHTML = '<div>Uploading... Please wait</div>';
            
            try {
                const response = await fetch('/api/students/batch-upload', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">
                            <h3>Upload Successful!</h3>
                            <p>Created: ${data.created_count} students</p>
                            <p>Total processed: ${data.total_processed}</p>
                            ${data.errors.length > 0 ? `<p>Errors: ${data.errors.length}</p>` : ''}
                        </div>
                    `;
                } else {
                    resultDiv.innerHTML = `
                        <div class="error">
                            <h3>Upload Failed</h3>
                            <p>${data.message}</p>
                            ${data.errors ? `<pre>${data.errors.join('\n')}</pre>` : ''}
                        </div>
                    `;
                }
            } catch (error) {
                resultDiv.innerHTML = `<div class="error">Network error: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
